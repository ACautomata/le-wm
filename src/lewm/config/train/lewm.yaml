defaults:
  - _self_
  - data: pusht

output_model_name: lewm
subdir: ${hydra:job.id}

num_workers: 6
train_split: 0.9
seed: 3072
img_size: 224
patch_size: 14
encoder_scale: tiny
embed_dim: 192
dump_object: True

trainer:
  max_epochs: 100
  devices: auto
  accelerator: gpu
  precision: bf16
  gradient_clip_val: 1.0

loader:
  batch_size: 128
  num_workers: ${num_workers}
  persistent_workers: True
  prefetch_factor: 3
  pin_memory: True

wandb:
  enabled: True
  config:
    entity: lewm
    project: lewm
    name: ${output_model_name}
    id: ${subdir}
    resume: allow
    log_model: False

wm:
  history_size: 3
  num_preds: 1
  action_dim: 2

  encoder:
    _target_: spt.backbone.utils.vit_hf
    size: ${encoder_scale}
    patch_size: ${patch_size}
    image_size: ${img_size}
    pretrained: false
    use_mask_token: false

  predictor:
    _target_: lewm.models.transformer.ARPredictor
    num_frames: ${wm.history_size}
    input_dim: ${embed_dim}
    depth: 6
    heads: 16
    mlp_dim: 2048
    dim_head: 64
    dropout: 0.1
    emb_dropout: 0.0

  action_encoder:
    _target_: lewm.models.components.Embedder
    emb_dim: ${embed_dim}

  projector:
    _target_: lewm.models.components.MLP
    output_dim: ${embed_dim}
    hidden_dim: 2048
    norm_fn: BatchNorm1d

  pred_proj:
    _target_: lewm.models.components.MLP
    output_dim: ${embed_dim}
    hidden_dim: 2048
    norm_fn: BatchNorm1d

  decoder:
    enabled: false
    _target_: lewm.models.decoder.Decoder
    cls_dim: ${embed_dim}
    hidden_dim: 256
    depth: 4
    heads: 8
    dim_head: 32
    mlp_dim: 512
    dropout: 0.0

  world_model:
    _target_: lewm.models.jepa.JEPA

loss:
  sigreg:
    weight: 0.09
    _target_: lewm.models.regularizers.SIGReg
    knots: 17
    num_proj: 1024

optimizers:
  model_opt:
    modules: model
    optimizer:
      type: AdamW
      lr: 5e-5
      weight_decay: 1e-3
    scheduler:
      type: LinearWarmupCosineAnnealingLR
    interval: epoch

callbacks:
  model_checkpoint:
    _target_: lewm.training.callbacks.ModelObjectCallBack
    dirpath: ${hydra:runtime.cwd}/${subdir}
    filename: ${output_model_name}
    epoch_interval: 1

  representation_quality:
    _target_: lewm.training.callbacks.RepresentationQualityCallback
    log_interval: 100

  system_monitoring:
    _target_: lewm.training.callbacks.SystemMonitoringCallback
    log_interval: 50

  embedding_statistics:
    _target_: lewm.training.callbacks.EmbeddingStatisticsCallback
    log_interval: 200

  prediction_quality:
    _target_: lewm.training.callbacks.PredictionQualityCallback
    log_interval: 100

  wandb_summary:
    _target_: lewm.training.callbacks.WandBSummaryCallback

  training_metrics_plot:
    _target_: lewm.training.callbacks.TrainingMetricsPlotCallback
    plot_format: png
    dpi: 300
